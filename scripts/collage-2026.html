<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:900px; height:640px; }
  .grid {
    position:relative; width:900px; height:640px;
    display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
    gap:5px; background:#cdb88a;
  }
  .grid img { width:100%; height:100%; object-fit:cover; display:block; filter:saturate(1.08) contrast(1.03); }
  .tint { position:absolute; inset:0; background:linear-gradient(135deg, rgba(122,92,102,0.10), rgba(200,163,90,0.12)); pointer-events:none; }
  .badge {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:200px; height:200px; border-radius:50%;
    background:rgba(36,24,22,0.62); backdrop-filter:blur(2px);
    border:1px solid rgba(232,201,138,0.6);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#f4efe6; font-family:Georgia, serif;
  }
  .badge .n { font-size:74px; line-height:1; color:#e8c98a; }
  .badge .t { font-family:'Courier New',monospace; font-size:12px; letter-spacing:4px; text-transform:uppercase; margin-top:8px; color:#e8c98a; }
  .badge .s { font-family:'Courier New',monospace; font-size:9px; letter-spacing:3px; text-transform:uppercase; margin-top:3px; opacity:0.8; }
</style></head>
<body>
  <div class="grid">
    <img src="file:///C:/Users/jordy/Desktop/Juana%20Sanchez/Media/photo_4913805138158357491_y.jpg">
    <img src="file:///C:/Users/jordy/Desktop/Juana%20Sanchez/Media/photo_4913805138158357488_y.jpg">
    <img src="file:///C:/Users/jordy/Desktop/Juana%20Sanchez/Media/photo_4913805138158357487_y.jpg">
    <img src="file:///C:/Users/jordy/Desktop/Juana%20Sanchez/Media/photo_4913805138158357485_y.jpg">
    <div class="tint"></div>
    <div class="badge">
      <div class="n">40</div>
      <div class="t">Años</div>
      <div class="s">MCMLXXV — MMXXVI</div>
    </div>
  </div>
</body></html>
